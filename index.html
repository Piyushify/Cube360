<!--document type declaration-->
<!DOCTYPE html>

<!--root-->
<html lang="en" class="light">
  
<!--head-->
<head>
  
  <!--meta for characterset-->
  <meta charset="UTF-8">
  
  <!--meta for compatibility-->
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  
  <!--meta for viewport-->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!--title-->
  <title>Cube 360°</title>
  
  <!--connect the css stylesheet-->
  <link rel="stylesheet" href="style.css">
  
</head>

<!--body-->
<body>
  
  <!--the scene-->
  <div id="scene">
    
  <!--website heading-->
  <h1 id="name">
    
    <!--alphabets of heading and the theme switch button-->
    <span>C</span><span>u</span><span>b</span><span>e</span><span>3</span><span>6</span><span>0</span><button onclick="switchTheme()">°</button>
  </h1>
  
    <!--the control behind controller-->
  <input type="checkbox" id="control" hidden>
  
  <!--the controller-->
  <label for="control" id="controller">
    
    <!--the cube-->
    <div id="cube">
      
      <!--the core-->
      <div id="core">
      </div>
    </div>
  </label>
  
  <!--the footer-->
  <footer>
    
    <!--the authoring-->
    <!--the link-->
    <a href="https://github.com/Piyushify" target="_blank">
    - by Piyushify<img src="imgs/piyushify.png" alt=""/>
    </a>
  </footer>
  
  <!--connect the script file-->
  <script src="main.js"></script>
</body>
</html>
